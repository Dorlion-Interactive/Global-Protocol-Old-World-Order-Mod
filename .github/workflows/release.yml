name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build SDK managed mod
        run: dotnet build "Content/mod-csharp/OldWorldOrder.ModCSharp.csproj" -c Release

      - name: Package mod (SDK primary)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $tag = "${{ github.ref_name }}"
          $zip = "old-world-order-$tag.zip"
          $staging = Join-Path $PWD "staging"

          if (Test-Path $staging) {
            Remove-Item $staging -Recurse -Force
          }

          New-Item -ItemType Directory -Path $staging | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $staging "Content") | Out-Null

          Copy-Item "mod.json" -Destination $staging -Force
          if (Test-Path "logo.png") { Copy-Item "logo.png" -Destination $staging -Force }
          if (Test-Path "thumbnail.png") { Copy-Item "thumbnail.png" -Destination $staging -Force }

          if (Test-Path "scenario") { Copy-Item "scenario" -Destination $staging -Recurse -Force }
          if (Test-Path "overrides") { Copy-Item "overrides" -Destination $staging -Recurse -Force }
          if (Test-Path "flags") { Copy-Item "flags" -Destination $staging -Recurse -Force }

          robocopy "Content" "$staging\Content" /E /NFL /NDL /NJH /NJS /R:1 /W:1 /XD wasm-as wasm-dotnet mod-csharp /XF *.ts *.cs *.csproj *.c *.h *.a *.rsp
          if ($LASTEXITCODE -gt 7) {
            throw "robocopy failed on Content with exit code $LASTEXITCODE"
          }

          New-Item -ItemType Directory -Path (Join-Path $staging "Mods") -Force | Out-Null
          Copy-Item "Content\mod-csharp\bin\Release\netstandard2.1\OldWorldOrder.ModCSharp.dll" -Destination (Join-Path $staging "Mods\OldWorldOrder.ModCSharp.dll") -Force

          powershell -NoProfile -ExecutionPolicy Bypass -File ".\dev\set-runtime-settings.ps1" -ModJsonPath (Join-Path $staging "mod.json") -BuildVariant "sdk"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to align runtime settings for SDK package"
          }

          $packagedWasm = Join-Path $staging "Content\mod.wasm"
          if (Test-Path $packagedWasm) {
            Remove-Item $packagedWasm -Force
          }

          $legacyEvent = Join-Path $staging "Content\events\owo_welcome.json"
          if (Test-Path $legacyEvent) {
            Remove-Item $legacyEvent -Force
          }

          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }
          if (Test-Path "old-world-order-latest.zip") {
            Remove-Item "old-world-order-latest.zip" -Force
          }

          Compress-Archive -Path (Join-Path $staging "*") -DestinationPath $zip -Force
          Copy-Item $zip "old-world-order-latest.zip" -Force

          $manifest = Get-Content (Join-Path $staging "mod.json") -Raw | ConvertFrom-Json
          Write-Host "runtimePolicy=$($manifest.runtimePolicy)"
          Write-Host "enableComponentRuntime=$($manifest.enableComponentRuntime)"
          Write-Host "Packaged: $zip"
          Get-ChildItem $zip | Select-Object Name, Length | Format-Table -AutoSize


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Old World Order ${{ github.ref_name }}"
          body: |
            ## Old World Order ${{ github.ref_name }}

            Historical total conversion mod for Global Protocol — 1450 AD.

            ### Install (players)

            1. Download **old-world-order-${{ github.ref_name }}.zip** below
            2. Extract the contents into:
               ```
               %LOCALAPPDATA%\NewWorldOrder\Mods\globalprotocol.old_world_order\
               ```
            3. Launch Global Protocol → Mods screen → enable **Old World Order** → start the 1450 scenario

            ### Install (developers / from source)

            ```bat
            git clone https://github.com/Dorlion-Interactive/Global-Protocol-Old-World-Order-Mod
            cd old-world-order
            install.bat
            ```

            `install.bat` defaults to the SDK path (`/sdk`).
            Recommended WASM runtime path is AssemblyScript (`install.bat /as`).
            See [README](https://github.com/Dorlion-Interactive/Global-Protocol-Old-World-Order-Mod#readme) for full details.
          files: |
            old-world-order-${{ github.ref_name }}.zip
            old-world-order-latest.zip
          fail_on_unmatched_files: true
