name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build SDK managed mod
        run: dotnet build "Content/mod-csharp/OldWorldOrder.ModCSharp.csproj" -c Release

      - name: Package mod (SDK primary)
        run: |
          TAG="${GITHUB_REF_NAME}"
          ZIP="old-world-order-${TAG}.zip"
          STAGING="staging"

          rm -rf "$STAGING"
          mkdir -p "$STAGING/Content"
          mkdir -p "$STAGING/Mods"

          cp mod.json "$STAGING/"
          [ -f logo.png ] && cp logo.png "$STAGING/"
          [ -f thumbnail.png ] && cp thumbnail.png "$STAGING/"

          [ -d scenario ] && cp -r scenario "$STAGING/"
          [ -d overrides ] && cp -r overrides "$STAGING/"
          [ -d flags ] && cp -r flags "$STAGING/"

          # Copy Content but exclude source/build files and the large pre-built wasm
          rsync -a \
            --exclude='wasm-as/' \
            --exclude='wasm-dotnet/' \
            --exclude='mod-csharp/' \
            --exclude='*.ts' \
            --exclude='*.cs' \
            --exclude='*.csproj' \
            --exclude='*.c' \
            --exclude='*.h' \
            --exclude='*.a' \
            --exclude='*.rsp' \
            --exclude='mod.wasm' \
            Content/ "$STAGING/Content/"

          # Copy built DLL to Mods/
          cp "Content/mod-csharp/bin/Release/netstandard2.1/OldWorldOrder.ModCSharp.dll" "$STAGING/Mods/"

          # Patch mod.json for SDK variant using jq
          jq '.runtimePolicy = "csharp_only" | .enableComponentRuntime = false | del(.entrypoints.wasm)' "$STAGING/mod.json" > "$STAGING/mod.json.tmp" && mv "$STAGING/mod.json.tmp" "$STAGING/mod.json"

          # Print debug info for logs
          echo "---- Runtime settings in packaged mod.json ----"
          jq -r '.runtimePolicy, .enableComponentRuntime' "$STAGING/mod.json"
          echo "------------------------------------------------"

          # Create zip
          cd "$STAGING"
          zip -r "../$ZIP" .
          cd ..
          cp "$ZIP" "old-world-order-latest.zip"

          echo "ZIP_NAME=$ZIP" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Old World Order ${{ github.ref_name }}"
          body: |
            ## Old World Order ${{ github.ref_name }}

            Historical total conversion mod for Global Protocol — 1450 AD.

            ### Install (players)

            1. Download **old-world-order-${{ github.ref_name }}.zip** below
            2. Extract the contents into:
               ```
               %LOCALAPPDATA%\NewWorldOrder\Mods\globalprotocol.old_world_order\
               ```
            3. Launch Global Protocol → Mods screen → enable **Old World Order** → start the 1450 scenario

            ### Install (developers / from source)

            ```bat
            git clone https://github.com/Dorlion-Interactive/Global-Protocol-Old-World-Order-Mod
            cd old-world-order
            install.bat
            ```

            `install.bat` defaults to the SDK path (`/sdk`).
            Recommended WASM runtime path is AssemblyScript (`install.bat /as`).
            See [README](https://github.com/Dorlion-Interactive/Global-Protocol-Old-World-Order-Mod#readme) for full details.
          files: |
            ${{ env.ZIP_NAME }}
            old-world-order-latest.zip
          fail_on_unmatched_files: true
